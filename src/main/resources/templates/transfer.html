<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Transfer Money</title>

    <style>

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #74ebd5, #acb6e5);
            min-height: 100vh;
        }

        /* NAVBAR */

        .navbar {
            background: #1e88e5;
            padding: 15px 30px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .navbar .logo {
            font-size: 22px;
            font-weight: bold;
        }

        .navbar a {
            color: white;
            margin-left: 15px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .navbar a:hover {
            color: #ffe082;
        }

        /* CONTAINER */

        .container {
            max-width: 450px;
            margin: 60px auto;
            background: white;
            padding: 35px;
            border-radius: 18px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        input {
            width: 100%;
            padding: 13px;
            margin-top: 12px;
            border: 1px solid #ccc;
            border-radius: 10px;
            font-size: 15px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #1e88e5;
            box-shadow: 0 0 8px rgba(30,136,229,0.5);
        }

        button {
            width: 100%;
            padding: 13px;
            margin-top: 18px;
            border: none;
            border-radius: 10px;
            background: #43a047;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #2e7d32;
            transform: scale(1.02);
        }

        .error {
            color: red;
            text-align: center;
            margin-top: 15px;
            font-weight: bold;
        }

        .note {
            text-align: center;
            margin-top: 18px;
            color: gray;
            font-size: 13px;
        }

    </style>
</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

    <div class="logo">
        🏦 Banking System
    </div>

    <div>
        <a href="/dashboard">Dashboard</a>
        <a href="/transfer">Transfer</a>
        <a href="/history">History</a>
        <a href="/logout">Logout</a>
    </div>

</div>

<!-- TRANSFER CARD -->

<div class="container">

    <h2>Transfer Money 💸</h2>

    <form action="/transfer" method="post">

        <input type="number"
               name="senderId"
               placeholder="Sender Account ID"
               required>

        <input type="number"
               name="receiverId"
               placeholder="Receiver Account ID"
               required>

        <input type="number"
               step="0.01"
               name="amount"
               placeholder="Enter Amount"
               required>

        <input type="password"
               name="password"
               placeholder="Enter Your Password"
               required>

        <button type="submit">
            Send Money
        </button>

    </form>

    <!-- ERROR MESSAGE -->

    <p class="error"
       th:if="${error != null}"
       th:text="${error}">
    </p>

    <!-- NOTE -->

    <div class="note">
        Make sure sender account has sufficient balance before transferring.
    </div>

</div>

</body>
</html>
