<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Transaction History</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #74ebd5, #acb6e5);
            min-height: 100vh;
        }

        .navbar {
            background: #1e88e5;
            padding: 15px;
            color: white;
            display: flex;
            justify-content: space-between;
        }

        .navbar a {
            color: white;
            margin: 0 10px;
            text-decoration: none;
            font-weight: bold;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            overflow: hidden;
            border-radius: 10px;
        }

        th {
            background: #1e88e5;
            color: white;
            padding: 12px;
        }

        td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        tr:hover {
            background-color: #f1f1f1;
        }

        .success {
            color: green;
            font-weight: bold;
        }

        .failed {
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div>🏦 Banking System</div>
    <div>
        <a href="/dashboard">Dashboard</a>
        <a href="/transfer">Transfer</a>
        <a href="/history">History</a>
        <a href="/logout">Logout</a>
    </div>
</div>

<div class="container">

    <h2>Transaction History 📊</h2>

    <table>

        <tr>
            <th>Sender</th>
            <th>Receiver</th>
            <th>Amount</th>
            <th>Status</th>
            <th>Time</th>
        </tr>

        <tr th:each="t : ${transactions}">

            <td th:text="${t.senderAccount}"></td>
            <td th:text="${t.receiverAccount}"></td>
            <td th:text="${t.amount}"></td>

            <td th:text="${t.status}"
                th:classappend="${t.status == 'SUCCESS'} ? 'success' : 'failed'">
            </td>

            <td th:text="${t.transactionTime}"></td>

        </tr>

    </table>

</div>

</body>
</html>
